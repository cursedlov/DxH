<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Interactivo Romántico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Intro -->
    <div id="intro">
        <h1>Bienvenido a tu mundo romántico 💖</h1>
        <button id="startBtn">Comenzar</button>
    </div>

    <!-- Juego Principal -->
    <div id="mainGame" class="hidden">
        <div id="batmanRoute">
            <h2>Ruta Batman 🦇</h2>
            <p>Sigue los pasos de Batman para encontrar el corazón secreto.</p>
            <button id="nextStep">Siguiente</button>
        </div>

        <div id="miniGames">
            <h2>Minijuegos 🎮</h2>
            <button class="miniGameBtn" data-game="saveCat">Salva al gatito 🐱</button>
            <button class="miniGameBtn" data-game="catchHearts">Atrapa corazones 💘</button>
            <button class="miniGameBtn" data-game="flowerGarden">Jardín de flores 🌹</button>
            <button class="miniGameBtn" data-game="memory">Memory 🧩</button>
            <button class="miniGameBtn" data-game="quiz">Quiz ❓</button>
            <button class="miniGameBtn" data-game="batmanRunner">Batman Runner 🦇</button>
            <button class="miniGameBtn" data-game="floatingPhrases">Frases flotantes ✨</button>
            <button class="miniGameBtn" data-game="typingMachine">Máquina de escribir ⌨️</button>
        </div>

        <div id="noButtonGame">
            <h2>Botón NO imposible ❌</h2>
            <button id="impossibleBtn">NO!</button>
        </div>

        <div id="finalScreen" class="hidden">
            <h1>¡Felicidades! 🎬</h1>
            <p>Has completado todos los desafíos y encontrado el corazón 💖</p>
            <button id="restartBtn">Reiniciar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
