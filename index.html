        <p>Elige uno para divertirnos juntos</p>

        <div class="juegos-grid">
            <div class="juego-card" onclick="jugarClicker()">
                <div class="emoji">💝</div>
                <div class="titulo">Clicker de Amor</div>
            </div>
            <div class="juego-card" onclick="jugarMemory()">
                <div class="emoji">🧩</div>
                <div class="titulo">Memoria de Parejas</div>
            </div>
            <div class="juego-card" onclick="jugarQuiz()">
                <div class="emoji">❓</div>
                <div class="titulo">Quiz de Nosotros</div>
            </div>
        </div>

        <button class="btn btn-outline" onclick="volverAFinal()" style="margin-top: 2rem; color: #a29bfe; border-color: #a29bfe;">
            ← Volver
        </button>
    </div>

    <!-- JUEGO: CLICKER -->
    <div id="juego-clicker" class="hidden container">
        <h1>💝 Clicker de Amor</h1>
        <p>¡Toca el corazón lo más rápido que puedas!</p>
        <div class="clicker-score">Corazones: <span id="clicker-count">0</span></div>
        <div class="clicker-area" onclick="clickCorazon()">💜</div>
        <p style="font-size: 1.5rem; margin-top: 1rem; color: #a29bfe;">Tiempo: <span id="clicker-timer">10</span>s</p>
        <button class="btn btn-outline" onclick="terminarJuego('clicker')" style="margin-top: 1rem; color: #a29bfe; border-color: #a29bfe;">
            Terminar
        </button>
    </div>

    <!-- JUEGO: MEMORIA -->
    <div id="juego-memory" class="hidden container">
        <h1>🧩 Memoria de Parejas</h1>
        <p>Encuentra las parejas iguales</p>
        <div class="clicker-score">Pares: <span id="memory-score">0</span>/4</div>
        <div class="memory-grid" id="memory-grid"></div>
        <button class="btn btn-outline" onclick="terminarJuego('memory')" style="margin-top: 1rem; color: #a29bfe; border-color: #a29bfe;">
            Terminar
        </button>
    </div>

    <!-- JUEGO: QUIZ -->
    <div id="juego-quiz" class="hidden container">
        <h1>❓ Quiz de Nosotros</h1>
        <p id="quiz-pregunta" style="font-family: 'Fredoka', sans-serif; color: #a29bfe; font-size: 1.5rem; margin-bottom: 1.5rem;"></p>
        <div id="quiz-opciones"></div>
        <div class="clicker-score" style="margin-top: 1.5rem;">Puntos: <span id="quiz-score">0</span></div>
        <button class="btn btn-outline" onclick="terminarJuego('quiz')" style="margin-top: 1rem; color: #a29bfe; border-color: #a29bfe;">
            Terminar
        </button>
    </div>

    <!-- FASE 5B: SEGUIR -->
    <div id="fase-seguir" class="hidden container">
        <div class="texto-personal">
            <p style="color: #fd79a8; font-size: 2.2rem; font-family: 'Fredoka', sans-serif;">Mi amor hermoso,</p>
            <p>Han pasado 8 meses desde que entraste a mi vida y cada día me doy cuenta de que eres la mejor persona que me ha podido pasar.</p>
            <p>Eres mi razón para levantarme con una sonrisa, mi paz en medio del caos, mi hogar en cualquier lugar del mundo.</p>
            <p>Contigo aprendí que el amor no son solo palabras, son acciones, son detalles, son esos momentos silenciosos donde todo se siente perfecto solo con tenerte cerca.</p>
            <p>Prometo seguir haciéndote reír, seguir siendo tu Batman (aunque tú también quieras serlo 😂), y seguir amándote con todo mi corazón.</p>
            <p>Eres mi presente, mi futuro, mi todo.</p>
            <p style="color: #fd79a8; font-size: 2rem; margin-top: 1.5rem;">Te amo más allá de lo que las palabras pueden expresar. 💜</p>
        </div>
        <button class="btn btn-primary pulse-glow" onclick="irATeAmoLento()" style="margin-top: 1rem;">
            Continuar... 💜
        </button>
    </div>

    <!-- FASE 6: TE AMO LENTO -->
    <div id="fase-teamo-lento" class="hidden container">
        <div class="te-amo-lento">TE AMO</div>
        <p style="margin-top: 2rem; animation: fadeIn 2s ease 1s both;">Por siempre y para siempre...</p>
        <button class="btn btn-primary" onclick="irACalificacion()" style="margin-top: 2rem; animation: fadeIn 2s ease 2s both;">
            Continuar 💜
        </button>
    </div>

    <!-- FASE 7: CALIFICACIÓN -->
    <div id="fase-calificacion" class="hidden container">
        <h1>¿Del 1 al 10 qué tanto te gustó?</h1>
        <p>Toca las estrellas para calificar...</p>
        <div class="estrellas-container" id="estrellas-container">
            <span class="estrella" data-valor="1" onclick="calificar(1)">⭐</span>
            <span class="estrella" data-valor="2" onclick="calificar(2)">⭐</span>
            <span class="estrella" data-valor="3" onclick="calificar(3)">⭐</span>
            <span class="estrella" data-valor="4" onclick="calificar(4)">⭐</span>
            <span class="estrella" data-valor="5" onclick="calificar(5)">⭐</span>
            <span class="estrella" data-valor="6" onclick="calificar(6)">⭐</span>
            <span class="estrella" data-valor="7" onclick="calificar(7)">⭐</span>
            <span class="estrella" data-valor="8" onclick="calificar(8)">⭐</span>
            <span class="estrella" data-valor="9" onclick="calificar(9)">⭐</span>
            <span class="estrella" data-valor="10" onclick="calificar(10)">⭐</span>
        </div>
        <div id="calificacion-mensaje" style="margin-top: 2rem; font-family: 'Fredoka', sans-serif; font-size: 1.5rem; color: #fd79a8;"></div>
    </div>

    <!-- FASE 8: OSCURECER -->
    <div class="dark-overlay" id="dark-overlay">
        <div class="final-text">
            <div style="font-size: 6rem; margin-bottom: 2rem;">💜</div>
            <div>TE AMO</div>
            <p style="font-family: 'Caveat', cursive; font-size: 2rem; color: #a29bfe; margin-top: 1rem;">Para siempre tuyo...</p>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- JAVASCRIPT LOGIC -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <script>
        let clickerPuntos = 0;
        let clickerTime = 10;
        let clickerInterval;
        let memoryPares = 0;
        let quizPuntos = 0;
        let quizPreguntaActual = 0;

        // Lista de "Te Amo" en varios idiomas para el carrusel
        const listaIdiomas = [
            "I Love You (Inglés)", "Je t'aime (Francés)", "Ti amo (Italiano)", "Ich liebe dich (Alemán)",
            "Te amo (Español)", "Eu te amo (Portugués)", "Saran'heo (Coreano)", "Aishiteru (Japonés)",
            "Wo ai ni (Chino)", "Ya tebya lyublyu (Ruso)", "Te sakam (Macedonio)", "Inshame (Árabe)"
        ];

        // Lluvia infinita de corazones de fondo
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = ['💜', '💖', '❤️', '✨'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }, 600);

        function elegirBatman() {
            document.getElementById('fase-inicio').classList.add('hidden');
            document.getElementById('fase-batman').classList.remove('hidden');
            iniciarSecuenciaBatman();
        }

        function elegirNae() {
            document.getElementById('fase-inicio').classList.add('hidden');
            document.getElementById('fase-nae').classList.remove('hidden');
        }

        function iniciarSecuenciaBatman() {
            // Generar el track de idiomas duplicado para scroll infinito continuo
            const track = document.getElementById('batman-idiomas-track');
            const dobleLista = [...listaIdiomas, ...listaIdiomas];
            dobleLista.forEach(idm => {
                const span = document.createElement('span');
                span.classList.add('idioma');
                span.innerText = idm + "  •  ";
                track.appendChild(span);
            });

            setTimeout(() => {
                document.getElementById('batman-seq-1').classList.add('seq-exit');
                setTimeout(() => {
                    document.getElementById('batman-idiomas-container').classList.remove('hidden');
                    document.getElementById('batman-idiomas-container').classList.add('fade-in-scale');
                    document.getElementById('btn-batman-continuar').classList.remove('hidden');
                }, 800);
            }, 2500);
        }

        function irADramaBatman() {
            document.getElementById('fase-batman').classList.add('hidden');
            document.getElementById('fase-drama').classList.remove('hidden');
        }

        function irANaeDesdeBatman() {
            document.getElementById('fase-drama').classList.add('hidden');
            document.getElementById('fase-nae').classList.remove('hidden');
        }

        // Hace que el botón NO huya del mouse o del touch
        function moverNo(event) {
            if (event) event.preventDefault();
            const btnNo = document.getElementById('btn-no');
            const x = Math.random() * (window.innerWidth - 160);
            const y = Math.random() * (window.innerHeight - 80);
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }

        function aceptarNoviazgo() {
            document.getElementById('fase-nae').classList.add('hidden');
            document.getElementById('fase-final').classList.remove('hidden');
            document.body.style.background = '#2c1a32'; // Tono más cálido/romántico
        }

        function irAMiniJuegos() {
            document.getElementById('fase-final').classList.add('hidden');
            document.getElementById('fase-minijuegos').classList.remove('hidden');
        }

        function volverAFinal() {
            document.getElementById('fase-minijuegos').classList.add('hidden');
            document.getElementById('fase-final').classList.remove('hidden');
        }

        function irASeguir() {
            document.getElementById('fase-final').classList.add('hidden');
            document.getElementById('fase-seguir').classList.remove('hidden');
        }

        /* ─── LOGICA JUEGO 1: CLICKER ─── */
        function jugarClicker() {
            document.getElementById('fase-minijuegos').classList.add('hidden');
            document.getElementById('juego-clicker').classList.remove('hidden');
            clickerPuntos = 0;
            clickerTime = 10;
            document.getElementById('clicker-count').innerText = clickerPuntos;
            document.getElementById('clicker-timer').innerText = clickerTime;

            clickerInterval = setInterval(() => {
                clickerTime--;
                document.getElementById('clicker-timer').innerText = clickerTime;
                if (clickerTime <= 0) {
                    clearInterval(clickerInterval);
                    alert(`¡Tiempo! Lograste darle ${clickerPuntos} clicks de amor puro. 💜`);
                    terminarJuego('clicker');
                }
            }, 1000);
        }

        function clickCorazon() {
            if (clickerTime > 0) {
                clickerPuntos++;
                document.getElementById('clicker-count').innerText = clickerPuntos;
            }
        }

        /* ─── LOGICA JUEGO 2: MEMORIA ─── */
        let cartasEscogidas = [];
        let cartasEscogidasId = [];
        function jugarMemory() {
            document.getElementById('fase-minijuegos').classList.add('hidden');
            document.getElementById('juego-memory').classList.remove('hidden');
            memoryPares = 0;
            document.getElementById('memory-score').innerText = memoryPares;

            const emojis = ['🐱', '👑', '🦇', '💜', '🐱', '👑', '🦇', '💜'];
            emojis.sort(() => 0.5 - Math.random());

            const grid = document.getElementById('memory-grid');
            grid.innerHTML = '';

            for (let i = 0; i < emojis.length; i++) {
                const card = document.createElement('div');
                card.classList.add('memory-card');
                card.setAttribute('data-id', i);
                card.innerText = emojis[i];
                card.addEventListener('click', voltearCarta);
                grid.appendChild(card);
            }
        }

        function voltearCarta() {
            let cardId = this.getAttribute('data-id');
            if (cartasEscogidasId.length < 2 && !cartasEscogidasId.includes(cardId) && !this.classList.contains('matched')) {
                this.classList.add('flipped');
                cartasEscogidas.push(this.innerText);
                cartasEscogidasId.push(cardId);

                if (cartasEscogidas.length === 2) {
                    setTimeout(verificarPar, 600);
                }
            }
        }

        function verificarPar() {
            const listaCartas = document.querySelectorAll('.memory-card');
            const opcionUnoId = cartasEscogidasId[0];
            const opcionDosId = cartasEscogidasId[1];

            if (cartasEscogidas[0] === cartasEscogidas[1]) {
                listaCartas[opcionUnoId].classList.add('matched');
                listaCartas[opcionDosId].classList.add('matched');
                memoryPares++;
                document.getElementById('memory-score').innerText = memoryPares;
                if (memoryPares === 4) {
                    setTimeout(() => {
                        alert("¡Eres genial! Encontraste todas las parejas a la perfección. 😍");
                        terminarJuego('memory');
                    }, 300);
                }
            } else {
                listaCartas[opcionUnoId].classList.remove('flipped');
                listaCartas[opcionDosId].classList.remove('flipped');
            }
            cartasEscogidas = [];
            cartasEscogidasId = [];
        }

        /* ─── LOGICA JUEGO 3: QUIZ ─── */
        const preguntasQuiz = [
            { q: "¿Quién te ama con locura?", a: ["Tu Batman 🦇", "Un clon", "Nadie"], correct: 0 },
            { q: "¿Cuánto tiempo llevamos sumando momentos?", a: ["5 meses", "8 hermosos meses 💜", "1 año"], correct: 1 },
            { q: "¿Quién es la princesa más guapa?", a: ["Tú, obvio 😍", "Gatúbela", "No sé"], correct: 0 }
        ];

        function jugarQuiz() {
            document.getElementById('fase-minijuegos').classList.add('hidden');
            document.getElementById('juego-quiz').classList.remove('hidden');
            quizPuntos = 0;
            quizPreguntaActual = 0;
            document.getElementById('quiz-score').innerText = quizPuntos;
            mostrarPregunta();
        }

        function mostrarPregunta() {
            if (quizPreguntaActual >= preguntasQuiz.length) {
                alert(`Quiz completado. ¡Tu puntuación es ${quizPuntos}/${preguntasQuiz.length}! Eres la compañera perfecta. ✨`);
                terminarJuego('quiz');
                return;
            }
            const data = preguntasQuiz[quizPreguntaActual];
            document.getElementById('quiz-pregunta').innerText = data.q;
            const contenedorOpciones = document.getElementById('quiz-opciones');
            contenedorOpciones.innerHTML = '';

            data.a.forEach((opcion, index) => {
                const btn = document.createElement('div');
                btn.classList.add('quiz-option');
                btn.innerText = opcion;
                btn.onclick = () => evaluarRespuesta(index, btn);
                contenedorOpciones.appendChild(btn);
            });
        }

        function evaluarRespuesta(index, elemento) {
            const correctIndex = preguntasQuiz[quizPreguntaActual].correct;
            const opciones = document.querySelectorAll('.quiz-option');
            opciones.forEach(opt => opt.style.pointerEvents = 'none'); // Desactiva clicks rápidos

            if (index === correctIndex) {
                elemento.classList.add('correct');
                quizPuntos++;
                document.getElementById('quiz-score').innerText = quizPuntos;
            } else {
                elemento.classList.add('wrong');
                opciones[correctIndex].classList.add('correct');
            }

            setTimeout(() => {
                quizPreguntaActual++;
                mostrarPregunta();
            }, 1500);
        }

        function terminarJuego(juego) {
            clearInterval(clickerInterval);
            document.getElementById(`juego-${juego}`).classList.add('hidden');
            document.getElementById('fase-minijuegos').classList.remove('hidden');
        }

        /* ─── LOGICA DEL CIERRE Y CALIFICACIÓN ─── */
        function irATeAmoLento() {
            document.getElementById('fase-seguir').classList.add('hidden');
            document.getElementById('fase-teamo-lento').classList.remove('hidden');
        }

        function irACalificacion() {
            document.getElementById('fase-teamo-lento').classList.add('hidden');
            document.getElementById('fase-calificacion').classList.remove('hidden');
        }

        function calificar(valor) {
            const estrellas = document.querySelectorAll('.estrella');
            estrellas.forEach((est, idx) => {
                if (idx < valor) {
                    est.classList.add('activa');
                } else {
                    est.classList.remove('activa');
                }
            });

            let mensaje = "";
            if (valor < 7) mensaje = `¿Un ${valor}? Bueno, ¡prometo esforzarme el doble el próximo mes! 😂💜`;
            else if (valor < 10) mensaje = `¡Un ${valor}! Me alegra muchísimo que te gustara, mi amor. 😍`;
            else mensaje = "¡Siiii! ¡Un 10/10! Sabía que te encantaría, mi princesa hermosa. 👑💜";

            document.getElementById('calificacion-mensaje').innerText = mensaje;

            // Transición suave al fundido negro final después de dar la nota
            setTimeout(() => {
                document.getElementById('dark-overlay').classList.add('active');
            }, 3000);
        }
    </script>
</body>
</html>
